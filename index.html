<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инструкция для интервьюеров · Нейминг бренда ИНТ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12181f;
  --panel:#1a222b;
  --panel-2:#20293380;
  --line:#2b3542;
  --ink:#eae6db;
  --ink-dim:#a2acb8;
  --ink-mute:#6c7686;
  --amber:#d4a24c;
  --amber-dim:#8a6a34;
  --teal:#4a9d96;
  --teal-dim:#2f5f5b;
  --red:#c0605a;
  --card-radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'PT Sans',Arial,sans-serif;
  font-size:16px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'PT Serif',Georgia,serif;font-weight:700;margin:0;color:var(--ink);}
::selection{background:var(--amber-dim);color:#fff;}
a{color:var(--amber);}

/* ---------- layout shell ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:280px;flex:none;
  background:linear-gradient(180deg,#151c24,#0f151b);
  border-right:1px solid var(--line);
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;
  z-index:20;
}
.sidebar-head{padding:22px 20px 14px;border-bottom:1px solid var(--line);}
.brand-eyebrow{
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--amber);font-weight:700;margin-bottom:6px;
}
.brand-title{font-size:19px;line-height:1.25;}
.brand-sub{font-size:12.5px;color:var(--ink-mute);margin-top:6px;}

.lang-switch{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:14px 16px;border-bottom:1px solid var(--line);
}
.lang-btn{
  border:1px solid var(--line);background:#151c24;color:var(--ink-dim);
  border-radius:7px;padding:8px 6px;font-family:'PT Sans',sans-serif;
  font-size:12.5px;font-weight:700;cursor:pointer;letter-spacing:.02em;
  transition:all .15s ease;text-align:center;
}
.lang-btn:hover{border-color:var(--amber-dim);color:var(--ink);}
.lang-btn.active{
  background:var(--amber);border-color:var(--amber);color:#1a140a;
}

.navlist{flex:1;overflow-y:auto;padding:10px 10px 20px;}
.nav-group-label{
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-mute);padding:14px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  width:100%;text-align:left;background:transparent;border:none;
  color:var(--ink-dim);padding:10px 10px;border-radius:8px;
  font-family:'PT Sans',sans-serif;font-size:14.5px;cursor:pointer;
  margin-bottom:2px;
}
.nav-item .num{
  flex:none;width:24px;height:24px;border-radius:6px;
  background:#232d38;color:var(--ink-mute);font-size:11.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  font-family:'PT Serif',serif;
}
.nav-item:hover{background:#1e2732;color:var(--ink);}
.nav-item.active{background:#26313d;color:var(--ink);}
.nav-item.active .num{background:var(--amber);color:#1a140a;}

/* ---------- main ---------- */
.main{flex:1;min-width:0;}
.topbar{
  position:sticky;top:0;z-index:15;
  background:rgba(18,24,31,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  padding:14px 40px;display:none;
  align-items:center;justify-content:space-between;
}
.mobile-menu-btn{
  display:none;border:1px solid var(--line);background:#1a222b;color:var(--ink);
  border-radius:7px;padding:8px 12px;font-size:14px;cursor:pointer;
}
.content{max-width:880px;margin:0 auto;padding:56px 44px 120px;}

.page-title-block{margin-bottom:34px;}
.eyebrow{
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--amber);font-weight:700;margin-bottom:10px;
}
.page-title{font-size:32px;line-height:1.2;}
.page-lede{color:var(--ink-dim);font-size:16px;margin-top:12px;max-width:640px;}

/* meta grid for each set */
.meta-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px;background:var(--line);border:1px solid var(--line);
  border-radius:var(--card-radius);overflow:hidden;margin:26px 0 30px;
}
.meta-cell{background:var(--panel);padding:14px 16px;}
.meta-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:5px;}
.meta-value{font-size:14.5px;color:var(--ink);font-weight:700;}

.section-h{
  display:flex;align-items:baseline;gap:10px;
  margin:44px 0 16px;
}
.section-h h3{font-size:20px;color:var(--ink);}
.section-h .tag{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;
}
.tag.amber{background:#3a2f1c;color:var(--amber);border:1px solid var(--amber-dim);}
.tag.teal{background:#1c3230;color:var(--teal);border:1px solid var(--teal-dim);}

.materials{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--card-radius);
  padding:16px 20px;margin-bottom:8px;
}
.materials-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);margin-bottom:8px;}
.materials ul{margin:0;padding-left:18px;}
.materials li{color:var(--ink-dim);font-size:14.5px;margin-bottom:4px;}

/* stage visual */
.stage-track{
  display:flex;align-items:stretch;gap:0;margin:18px 0 8px;
  border-radius:var(--card-radius);overflow:hidden;border:1px solid var(--line);
}
.stage-block{flex:1;padding:16px 18px;background:var(--panel);position:relative;}
.stage-block.s1{border-right:1px dashed var(--line);}
.stage-block .stage-kicker{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:4px;
}
.stage-block.s1 .stage-kicker{color:var(--amber);}
.stage-block.s2 .stage-kicker{color:var(--teal);}
.stage-block .stage-desc{font-size:13.5px;color:var(--ink-dim);}
.stage-arrow{
  flex:none;width:34px;display:flex;align-items:center;justify-content:center;
  background:var(--panel);color:var(--ink-mute);font-size:18px;
}

/* steps */
.steps{list-style:none;margin:0 0 6px;padding:0;counter-reset:step;}
.step{
  counter-increment:step;
  display:grid;grid-template-columns:34px 1fr;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--line);
}
.step:last-child{border-bottom:none;}
.step::before{
  content:counter(step);
  width:26px;height:26px;border-radius:50%;
  background:#232d38;color:var(--ink-dim);
  font-family:'PT Serif',serif;font-weight:700;font-size:12.5px;
  display:flex;align-items:center;justify-content:center;
  align-self:start;margin-top:1px;
}
.steps.stage1 .step::before{background:#3a2f1c;color:var(--amber);}
.steps.stage2 .step::before{background:#1c3230;color:var(--teal);}
.step-body{font-size:15px;color:var(--ink);padding-top:2px;}
.step-body .code{
  display:inline-block;background:#232d38;color:var(--ink-dim);
  font-family:'PT Serif',serif;font-size:12.5px;font-weight:700;
  padding:1px 7px;border-radius:5px;margin-right:7px;
}
.step-body .cond{
  display:block;margin-top:5px;font-size:13.5px;color:var(--ink-mute);
  border-left:2px solid var(--line);padding-left:10px;
}

/* transition phrase callout */
.phrase-box{
  background:linear-gradient(135deg,#241c10,#1a222b);
  border:1px solid var(--amber-dim);border-radius:var(--card-radius);
  padding:20px 22px;margin:16px 0 30px;position:relative;
}
.phrase-box::before{
  content:"“";font-family:'PT Serif',serif;font-size:64px;color:var(--amber-dim);
  position:absolute;top:-6px;left:14px;line-height:1;opacity:.5;
}
.phrase-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);font-weight:700;margin-bottom:10px;}
.phrase-text{font-family:'PT Serif',serif;font-size:17px;line-height:1.6;color:var(--ink);position:relative;padding-left:8px;}

/* golden rule / warning box */
.rule-box{
  background:#241a1a;border:1px solid #5a3a38;border-radius:var(--card-radius);
  padding:18px 20px;margin:22px 0;display:flex;gap:14px;align-items:flex-start;
}
.rule-box .icon{flex:none;font-size:20px;line-height:1;margin-top:1px;}
.rule-box .rule-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red);margin-bottom:4px;}
.rule-box p{margin:0;color:var(--ink-dim);font-size:14.5px;}

.note-box{
  background:#1c2a20;border:1px solid #3a5a44;border-radius:var(--card-radius);
  padding:18px 20px;margin:22px 0;
}
.note-box .note-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7fbf8f;margin-bottom:8px;}
.note-box ul{margin:0;padding-left:18px;}
.note-box li{color:var(--ink-dim);font-size:14.5px;margin-bottom:5px;}

.mistake-box{
  background:#231c14;border:1px solid #6b4a2e;border-radius:var(--card-radius);
  padding:18px 20px;margin:22px 0;
}
.mistake-box .mistake-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:8px;}
.mistake-box p{margin:0;color:var(--ink-dim);font-size:14.5px;}

.timing-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:#20293b;border:1px solid var(--line);border-radius:20px;
  padding:6px 14px;font-size:13.5px;color:var(--ink-dim);margin-top:6px;
}
.timing-pill b{color:var(--ink);}

/* summary table */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--card-radius);margin:16px 0 30px;}
table.summary{width:100%;border-collapse:collapse;min-width:640px;}
table.summary th{
  text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ink-mute);padding:12px 14px;background:#182028;border-bottom:1px solid var(--line);
}
table.summary td{
  padding:13px 14px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink-dim);
}
table.summary tr:last-child td{border-bottom:none;}
table.summary td.setname{color:var(--ink);font-weight:700;}
table.summary tbody tr:hover{background:#1c2530;}

/* checklist */
.checklist{list-style:none;margin:0;padding:0;}
.checklist li{
  display:flex;gap:12px;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px;color:var(--ink-dim);
}
.checklist li:last-child{border-bottom:none;}
.checklist .box{
  flex:none;width:18px;height:18px;border:1.5px solid var(--amber-dim);border-radius:4px;margin-top:2px;
}

/* two-stage overview diagram */
.diagram{
  display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:stretch;
  margin:22px 0 8px;
}
.diagram .dblock{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--card-radius);
  padding:20px;
}
.diagram .dblock.stage1{border-top:3px solid var(--amber);}
.diagram .dblock.stage2{border-top:3px solid var(--teal);}
.diagram .dmid{display:flex;align-items:center;justify-content:center;padding:0 16px;color:var(--ink-mute);font-size:22px;}
.diagram .dkicker{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px;}
.diagram .dblock.stage1 .dkicker{color:var(--amber);}
.diagram .dblock.stage2 .dkicker{color:var(--teal);}
.diagram .dtitle{font-family:'PT Serif',serif;font-size:16.5px;margin-bottom:6px;}
.diagram .ddesc{font-size:13.5px;color:var(--ink-dim);}

.footer-nav{
  display:flex;justify-content:space-between;margin-top:60px;padding-top:24px;border-top:1px solid var(--line);
  gap:16px;
}
.footer-nav .fbtn{
  border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);
  border-radius:8px;padding:12px 18px;font-size:14px;cursor:pointer;font-family:'PT Sans',sans-serif;
  display:flex;flex-direction:column;gap:2px;max-width:48%;
}
.footer-nav .fbtn .flabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);}
.footer-nav .fbtn .ftitle{color:var(--ink);font-weight:700;}
.footer-nav .fbtn:hover{border-color:var(--amber-dim);}
.footer-nav .fbtn.next{text-align:right;align-items:flex-end;margin-left:auto;}

.overlay{display:none;}
@media (max-width:960px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.5);}
  .sidebar.open{transform:translateX(0);}
  .topbar{display:flex;}
  .mobile-menu-btn{display:inline-block;}
  .content{padding:36px 20px 100px;}
  .page-title{font-size:26px;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:19;}
  .overlay.show{display:block;}
  .diagram{grid-template-columns:1fr;}
  .diagram .dmid{padding:8px 0;transform:rotate(90deg);}
}
</style>
</head>

let lang = 'ru';
let currentSet = 'overview';
const order = ["overview","set1","set2","set3","set4","set5","moduleE"];

function esc(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function renderNav(){
  const t=T[lang];
  const groups=[
    {label:t.groupOverview,items:["overview"]},
    {label:t.groupSets,items:["set1","set2","set3","set4","set5"]},
    {label:t.groupModule,items:["moduleE"]}
  ];
  let html='';
  groups.forEach(g=>{
    html+=`<div class="nav-group-label">${esc(g.label)}</div>`;
    g.items.forEach(id=>{
      const meta=SETS_META.find(s=>s.id===id);
      const active=id===currentSet?' active':'';
      html+=`<button class="nav-item${active}" onclick="goTo('${id}')"><span class="num">${meta.icon}</span><span>${esc(t.nav[id])}</span></button>`;
    });
  });
  document.getElementById('navlist').innerHTML=html;
}

function stepsHtml(list, stageClass, ci){
  if(!list) return '';
  let html=`<ul class="steps ${stageClass}">`;
  list.forEach(s=>{
    html+=`<li class="step"><div></div><div class="step-body">`;
    if(s.c) html+=`<span class="code">${esc(s.c)}</span>`;
    html+=esc(s.t);
    if(s.cond) html+=`<span class="cond">${esc(s.cond)}</span>`;
    html+=`</div></li>`;
  });
  html+='</ul>';
  return html;
}

function renderSet(t, key){
  const s=t[key];
  let html=`
    <div class="page-title-block">
      <div class="eyebrow">${esc(s.countries)}</div>
      <h1 class="page-title">${esc(s.title)}</h1>
      ${s.subtitle?`<p class="page-lede">${esc(s.subtitle)}</p>`:''}
    </div>

    <div class="meta-grid">
      <div class="meta-cell"><div class="meta-label">${esc(t.labels.testType)}</div><div class="meta-value">${esc(s.testType)}</div></div>
      <div class="meta-cell"><div class="meta-label">${esc(t.labels.participants)}</div><div class="meta-value">${esc(s.participants)}</div></div>
      <div class="meta-cell"><div class="meta-label">${esc(t.labels.questions)}</div><div class="meta-value">${esc(s.questions)}</div></div>
      <div class="meta-cell"><div class="meta-label">${esc(t.labels.time)}</div><div class="meta-value">${esc(s.time)}</div></div>
    </div>

    <div class="materials">
      <div class="materials-title">${esc(t.labels.materials)}</div>
      <ul>${s.materials.map(m=>`<li>${esc(m)}</li>`).join('')}</ul>
    </div>
  `;

  if(s.importantLabel){
    html+=`<div class="note-box"><div class="note-label">${esc(s.importantLabel)}</div><ul><li>${esc(s.important)}</li></ul></div>`;
  }

  if(s.rotationTitle){
    html+=`<div class="section-h"><h3>${esc(s.rotationTitle)}</h3></div>
    <div class="table-wrap"><table class="summary">
      <thead><tr>${s.rotationHeaders.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
      <tbody>${s.rotationRows.map(r=>`<tr><td class="setname">${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join('')}</tbody>
    </table></div>`;
    if(s.rotationNote) html+=`<p class="page-lede">${esc(s.rotationNote)}</p>`;
  }

  if(s.preSteps){
    html+=`<div class="section-h"><span class="tag amber">${esc(t.labels.transition)}</span></div>` +
    stepsHtml(s.preSteps,'stage1');
  }

  html+=`<div class="section-h"><h3>${esc(t.labels.stage1)}</h3><span class="tag amber">①</span></div>`;
  if(s.stage1Lede) html+=`<p class="page-lede">${esc(s.stage1Lede)}</p>`;
  html+=stepsHtml(s.stage1,'stage1');

  if(s.transitionText){
    html+=`<div class="phrase-box" style="margin-top:26px;">
      <div class="phrase-label">${esc(t.labels.transition)}</div>
      <div class="phrase-text">${esc(s.transitionText)}</div>
    </div>`;
  }

  html+=`<div class="section-h"><h3>${esc(t.labels.stage2)}</h3><span class="tag teal">②</span></div>`;
  if(s.stage2Lede) html+=`<p class="page-lede">${esc(s.stage2Lede)}</p>`;
  html+=stepsHtml(s.stage2,'stage2');

  if(s.finalLabel){
    html+=`<div class="section-h"><h3>${esc(s.finalLabel)}</h3></div>
    <div class="materials"><p style="margin:0;color:var(--ink-dim);font-size:14.5px;">${esc(s.final)}</p></div>`;
  }

  if(s.time){
    html+=`<div class="timing-pill">⏱ <b>${esc(t.labels.timing)}:</b> ${esc(s.time)}</div>`;
  }

  if(s.keyDiff){
    html+=`<div class="section-h"><h3>${esc(t.labels.keyDiff)}</h3></div>
    <div class="note-box"><p style="margin:0;color:var(--ink-dim);font-size:14.5px;">${esc(s.keyDiff)}</p></div>`;
  }

  if(s.notes){
    html+=`<div class="note-box"><div class="note-label">${esc(t.labels.attention)}</div><ul>${s.notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;
  }

  if(s.mistakes){
    html+=`<div class="mistake-box"><div class="mistake-label">${esc(t.labels.mistakes)}</div><p>${esc(s.mistakes)}</p></div>`;
  }

  return html;
}

function renderFooterNav(){
  const t=T[lang];
  const idx=order.indexOf(currentSet);
  const prevId=idx>0?order[idx-1]:null;
  const nextId=idx<order.length-1?order[idx+1]:null;
  let html='<div class="footer-nav">';
  if(prevId){
    html+=`<button class="fbtn prev" onclick="goTo('${prevId}')"><span class="flabel">${esc(t.footerPrev)}</span><span class="ftitle">${esc(t.nav[prevId])}</span></button>`;
  } else { html+='<div></div>'; }
  if(nextId){
    html+=`<button class="fbtn next" onclick="goTo('${nextId}')"><span class="flabel">${esc(t.footerNext)}</span><span class="ftitle">${esc(t.nav[nextId])}</span></button>`;
  }
  html+='</div>';
  return html;
}

function render(){
  document.documentElement.lang = lang==='ru'?'ru':(lang==='uz'?'uz':(lang==='tg'?'tg':'ky'));
  const t=T[lang];
  document.title = t.brandTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(t[key]) el.textContent=t[key];
  });
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang')===lang);
  });

  let body='';
  if(currentSet==='overview') body=renderOverview(t);
  else if(currentSet==='moduleE') body=renderModuleE(t);
  else body=renderSet(t,currentSet);

  body+=renderFooterNav();
  document.getElementById('content').innerHTML=body;
  renderNav();
  window.scrollTo({top:0,behavior:'instant'});
  closeSidebar();
}

function setLang(l){ lang=l; render(); }
function goTo(id){ currentSet=id; render(); }
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

render();
</script>
