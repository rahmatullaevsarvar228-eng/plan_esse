<!doctype html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интервью олувчилар учун қўлланма · HTP naming study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=PT+Sans:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16233F;
  --navy2:#223760;
  --navy3:#2E4A82;
  --accent:#2F7A6B;
  --accent-soft:#E4F0EC;
  --stamp:#B3652E;
  --warn-bg:#FBEAE6;
  --warn-border:#B3432B;
  --warn-text:#7A2E1D;
  --note-bg:#EAF1F7;
  --note-border:#2F5C8A;
  --note-text:#1F3B57;
  --paper:#F6F4EE;
  --card:#FFFFFF;
  --ink:#1B2130;
  --muted:#666C78;
  --border:#E3DFD2;
  --sidebar-w:290px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'PT Sans', 'Segoe UI', sans-serif;
  font-size:16px;
  line-height:1.55;
}
h1,h2,h3,.disp{font-family:'Manrope', sans-serif;}
.mono{font-family:'JetBrains Mono', monospace;}
a{color:inherit;}
::selection{background:var(--accent-soft);}

/* ===== HEADER ===== */
.topbar{
  position:sticky; top:0; z-index:50;
  background:var(--navy);
  color:#fff;
  border-bottom:3px solid var(--stamp);
}
.topbar-inner{
  max-width:1280px; margin:0 auto;
  padding:14px 22px;
  display:flex; align-items:center; gap:18px; flex-wrap:wrap;
}
.kit-tag{
  font-family:'JetBrains Mono', monospace;
  font-size:11px; letter-spacing:.12em;
  background:var(--stamp); color:#fff;
  padding:4px 9px; border-radius:3px;
  white-space:nowrap;
  text-transform:uppercase;
}
.topbar-title{
  font-weight:800; font-size:17px; letter-spacing:.01em;
  flex:1 1 auto; min-width:180px;
}
.topbar-title small{
  display:block; font-family:'PT Sans',sans-serif;
  font-weight:400; font-size:12.5px; color:#C6D0E4; margin-top:2px;
}

/* language stamps */
.stamps{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.stamp-label{font-size:11px; color:#9FB0CC; font-family:'JetBrains Mono',monospace; letter-spacing:.1em; margin-right:2px; text-transform:uppercase;}
.stamp-btn{
  position:relative;
  width:46px; height:46px;
  border-radius:50%;
  border:2px dashed #6C7FA4;
  background:transparent;
  color:#D7DEEC;
  font-family:'JetBrains Mono',monospace;
  font-weight:700; font-size:12.5px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
}
.stamp-btn:hover{border-color:#fff; color:#fff;}
.stamp-btn.active{
  background:var(--stamp);
  border:2px solid var(--stamp);
  border-style:solid;
  color:#fff;
  transform:rotate(-6deg) scale(1.08);
  box-shadow:0 3px 10px rgba(0,0,0,.35);
}
.stamp-btn:focus-visible{outline:2px solid #fff; outline-offset:2px;}

/* progress rail */
.progress-rail{height:4px; background:#0F1930;}
.progress-fill{height:100%; width:0%; background:var(--accent); transition:width .25s ease;}

/* ===== LAYOUT ===== */
.layout{
  max-width:1280px; margin:0 auto;
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  gap:0;
  align-items:start;
}
.sidebar{
  position:sticky; top:57px;
  height:calc(100vh - 57px);
  overflow-y:auto;
  padding:26px 14px 40px 22px;
  border-right:1px solid var(--border);
}
.side-hint{
  font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace;
  text-transform:uppercase; letter-spacing:.08em; margin:4px 0 12px;
}
.navlist{list-style:none; margin:0; padding:0;}
.navlist li{margin-bottom:2px;}
.navlink{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:8px;
  text-decoration:none; color:var(--ink);
  font-size:14px; font-weight:700;
  border-left:3px solid transparent;
  transition:background .15s ease, border-color .15s ease, color .15s ease;
}
.navlink .num{
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  width:22px; height:22px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  border:1.5px dashed #B7BFCF; color:var(--muted); flex:0 0 auto;
}
.navlink:hover{background:#EFEAdd;}
.navlink.done .num{border-style:solid; border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
.navlink.active{background:var(--navy); color:#fff; border-left-color:var(--stamp);}
.navlink.active .num{border-color:#fff; color:#fff; background:transparent;}

/* ===== MAIN ===== */
main{padding:30px 26px 90px; min-width:0;}

.hero{
  background:linear-gradient(135deg, var(--navy) 0%, var(--navy3) 100%);
  color:#fff; border-radius:14px; padding:30px 28px;
  margin-bottom:30px; position:relative; overflow:hidden;
}
.hero::after{
  content:""; position:absolute; right:-40px; top:-40px; width:220px; height:220px;
  border:2px dashed rgba(255,255,255,.18); border-radius:50%;
}
.hero-badge{
  display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11.5px;
  letter-spacing:.1em; text-transform:uppercase; background:rgba(255,255,255,.12);
  padding:5px 10px; border-radius:20px; margin-bottom:14px;
}
.hero h1{font-size:clamp(24px,3.4vw,34px); margin:0 0 10px; font-weight:800; letter-spacing:-.01em;}
.hero p{margin:0; font-size:15.5px; color:#D6DEEE; max-width:640px;}
.quickfacts{display:flex; gap:26px; margin-top:22px; flex-wrap:wrap; position:relative; z-index:1;}
.qf{min-width:70px;}
.qf b{display:block; font-family:'Manrope',sans-serif; font-size:26px; font-weight:800;}
.qf span{font-size:12px; color:#B9C4DC; text-transform:uppercase; letter-spacing:.06em;}

.section-card{
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:26px 26px 22px; margin-bottom:22px; scroll-margin-top:72px;
}
.section-head{display:flex; align-items:center; gap:14px; margin-bottom:16px;}
.section-num{
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px;
  width:42px; height:42px; flex:0 0 auto; border-radius:8px;
  border:2px dashed var(--stamp); color:var(--stamp);
  display:flex; align-items:center; justify-content:center;
}
.section-head h2{margin:0; font-size:19.5px; font-weight:800; color:var(--navy); letter-spacing:-.005em;}

.section-card h3{font-size:15px; color:var(--navy2); margin:18px 0 8px; font-weight:700;}
.section-card p{margin:0 0 12px; color:#333947;}

ul.bullets{margin:0 0 6px; padding-left:0; list-style:none;}
ul.bullets li{
  position:relative; padding:6px 0 6px 24px; font-size:15px; color:#2A2F3A;
  border-bottom:1px dashed #ECE8DB;
}
ul.bullets li:last-child{border-bottom:none;}
ul.bullets li::before{
  content:"›"; position:absolute; left:2px; top:5px; color:var(--stamp); font-weight:700; font-size:16px;
}

.callout{
  border-radius:8px; padding:12px 14px; margin:12px 0; font-size:14.5px;
  display:flex; gap:10px; align-items:flex-start; border:1px solid;
}
.callout .tag{
  font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; padding:2px 7px; border-radius:4px; flex:0 0 auto; margin-top:1px;
}
.callout.warn{background:var(--warn-bg); border-color:#F0C6BC; color:var(--warn-text);}
.callout.warn .tag{background:var(--warn-border); color:#fff;}
.callout.note{background:var(--note-bg); border-color:#C4D7E8; color:var(--note-text);}
.callout.note .tag{background:var(--note-border); color:#fff;}

table{width:100%; border-collapse:collapse; font-size:14.5px;}
.table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:8px; margin-bottom:8px;}
table thead th{
  background:var(--navy); color:#fff; text-align:left; padding:10px 12px;
  font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; white-space:nowrap;
}
table tbody td{padding:10px 12px; border-top:1px solid var(--border); vertical-align:top;}
table tbody tr:nth-child(even){background:#FAF8F2;}
table tbody td:first-child{font-weight:700; color:var(--navy2); white-space:nowrap;}

.checklist{list-style:none; margin:0; padding:0;}
.checklist li{
  display:flex; align-items:center; gap:12px; padding:10px 6px;
  border-bottom:1px dashed #ECE8DB; cursor:pointer; user-select:none;
}
.checklist li:last-child{border-bottom:none;}
.checklist .box{
  width:22px; height:22px; border-radius:5px; border:2px solid #B7BFCF; flex:0 0 auto;
  display:flex; align-items:center; justify-content:center; transition:all .15s ease;
}
.checklist .box svg{width:13px; height:13px; opacity:0; transition:opacity .15s;}
.checklist li.checked .box{background:var(--accent); border-color:var(--accent);}
.checklist li.checked .box svg{opacity:1;}
.checklist li.checked .txt{color:var(--muted); text-decoration:line-through;}
.checklist-progress{font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--muted); margin-top:10px;}

.footer-note{
  text-align:center; color:var(--muted); font-size:13px; padding:34px 20px 10px;
  border-top:1px solid var(--border); margin-top:10px;
}

/* mobile nav toggle */
.nav-toggle{display:none;}

@media (max-width: 900px){
  .layout{grid-template-columns:1fr;}
  .sidebar{
    position:static; height:auto; border-right:none; border-bottom:1px solid var(--border);
    padding:14px 16px;
  }
  .navlist{display:flex; overflow-x:auto; gap:6px; padding-bottom:6px;}
  .navlist li{margin:0;}
  .navlink{white-space:nowrap;}
  .side-hint{display:none;}
  main{padding:20px 16px 70px;}
  .stamp-btn{width:38px; height:38px; font-size:11px;}
  .quickfacts{gap:16px;}
}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *{transition:none !important;}
}
</style>
</head>

/* ============================================================
   RENDER LOGIC
   ============================================================ */
let currentLang = "uz-cyrl";
const CHECK_SVG = '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 8.5L6 12.5L14 3.5" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const checkedState = {}; // persists across language switches, keyed by section+index

function esc(s){ return s; }

function renderBlock(block, secIdx){
  if(block.type === "table"){
    let thead = "<thead><tr>" + block.headers.map(h=>`<th>${h}</th>`).join("") + "</tr></thead>";
    let tbody = "<tbody>" + block.rows.map(r=>"<tr>"+r.map(c=>`<td>${c}</td>`).join("")+"</tr>").join("") + "</tbody>";
    return `<div class="table-wrap"><table>${thead}${tbody}</table></div>`;
  }
  if(block.type === "bullets"){
    return `<ul class="bullets">${block.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
  }
  if(block.type === "warning"){
    return `<div class="callout warn"><span class="tag">${T[currentLang].ui.warnLabel}</span><div>${block.text}</div></div>`;
  }
  if(block.type === "warninglist"){
    return block.items.map(i=>`<div class="callout warn"><span class="tag">${T[currentLang].ui.warnLabel}</span><div>${i}</div></div>`).join("");
  }
  if(block.type === "note"){
    return `<div class="callout note"><span class="tag">${T[currentLang].ui.noteLabel}</span><div>${block.text}</div></div>`;
  }
  if(block.type === "subheading"){
    return `<h3>${block.text}</h3>`;
  }
  if(block.type === "paragraph"){
    return `<p>${block.text}</p>`;
  }
  if(block.type === "checklist"){
    let items = block.items.map((i,idx)=>{
      const key = secIdx+"-"+idx;
      const checked = checkedState[key] ? "checked" : "";
      return `<li class="${checked}" data-key="${key}"><span class="box">${CHECK_SVG}</span><span class="txt">${i}</span></li>`;
    }).join("");
    return `<ul class="checklist">${items}</ul><div class="checklist-progress" id="checkProgress"></div>`;
  }
  return "";
}

function render(){
  const data = T[currentLang];
  document.documentElement.lang = currentLang.split("-")[0];

  // header
  document.getElementById("uiTitle").childNodes[0].textContent = data.meta.title + " ";
  document.getElementById("uiSubtitle").textContent = data.meta.subtitle;
  document.getElementById("uiLangLabel").textContent = data.ui.langLabel;
  document.getElementById("uiProgressLabel").textContent = data.ui.progressLabel;

  // hero
  document.getElementById("heroBadge").textContent = data.meta.badge;
  document.getElementById("heroTitle").textContent = data.meta.title;
  document.getElementById("heroSubtitle").textContent = data.meta.subtitle;
  document.getElementById("quickFacts").innerHTML = data.meta.quickFacts.map(f=>
    `<div class="qf"><b>${f.value}</b><span>${f.label}</span></div>`).join("");

  // nav
  const navList = document.getElementById("navList");
  navList.innerHTML = data.sections.map((s,i)=>
    `<li><a class="navlink" href="#sec-${i}" data-idx="${i}"><span class="num">${i+1}</span><span>${s.title}</span></a></li>`
  ).join("");

  // sections
  const wrap = document.getElementById("sections");
  wrap.innerHTML = data.sections.map((s,i)=>{
    const blocksHtml = s.blocks.map(b=>renderBlock(b,i)).join("");
    return `<section class="section-card" id="sec-${i}">
      <div class="section-head"><div class="section-num">${String(i+1).padStart(2,"0")}</div><h2>${s.title}</h2></div>
      ${blocksHtml}
    </section>`;
  }).join("");

  document.getElementById("footerNote").textContent = data.ui.footer;

  updateChecklistProgress();
  bindChecklist();
  setupScrollSpy();

  // active stamp
  document.querySelectorAll(".stamp-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang === currentLang);
  });
}

function updateChecklistProgress(){
  const el = document.getElementById("checkProgress");
  if(!el) return;
  const total = Object.keys(checkedState).length ? document.querySelectorAll(".checklist li").length : document.querySelectorAll(".checklist li").length;
  const totalItems = document.querySelectorAll(".checklist li").length;
  const done = document.querySelectorAll(".checklist li.checked").length;
  const label = T[currentLang].ui.progressLabel;
  el.textContent = `${label}: ${done} / ${totalItems}`;
}

function bindChecklist(){
  document.querySelectorAll(".checklist li").forEach(li=>{
    li.addEventListener("click", ()=>{
      const key = li.dataset.key;
      checkedState[key] = !checkedState[key];
      li.classList.toggle("checked", !!checkedState[key]);
      updateChecklistProgress();
    });
  });
}

/* scrollspy + top progress bar */
let observer;
function setupScrollSpy(){
  const sections = document.querySelectorAll(".section-card");
  const navlinks = document.querySelectorAll(".navlink");
  if(observer) observer.disconnect();
  const seen = new Set();

  observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const idx = entry.target.id.split("-")[1];
      if(entry.isIntersecting){
        seen.add(idx);
        navlinks.forEach(l=>l.classList.remove("active"));
        const link = document.querySelector(`.navlink[data-idx="${idx}"]`);
        if(link) link.classList.add("active");
      }
    });
    navlinks.forEach(l=>{
      if(seen.has(l.dataset.idx)) l.classList.add("done");
    });
    const fill = document.getElementById("progressFill");
    if(fill) fill.style.width = (seen.size / sections.length * 100) + "%";
  }, { rootMargin: "-15% 0px -70% 0px", threshold: 0 });

  sections.forEach(s=>observer.observe(s));
}

/* language switch buttons */
document.querySelectorAll(".stamp-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    currentLang = btn.dataset.lang;
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  });
});

render();
</script>
